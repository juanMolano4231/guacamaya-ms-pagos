services:
  app:
    build: .
    container_name: ms-pagos
    ports:
      - "8088:8080"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - guacamaya-net

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: guacamaya_pagos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ikEvs1crXV2ewH4SD0v0
    ports:
      - "5442:5432"
    volumes:
      - guacamaya_pagos:/var/lib/postgresql/data
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/1-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

volumes:
  guacamaya_pagos:

networks:
  default: {}
  guacamaya-net:
    external: true
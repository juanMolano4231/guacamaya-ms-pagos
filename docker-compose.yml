services:
  app:
    build: .
    ports:
      - "8084:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: guacamaya_compras
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ikEvs1crXV2ewH4SD0v0
    ports:
      - "5437:5432"
    volumes:
      - pgdata_compras:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_compras: